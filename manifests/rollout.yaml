apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: go-simple-webserver
  labels:
    app: go-simple-webserver
spec:
  replicas: 10
  strategy:
    canary:
      steps:
        - setWeight: 50
        - pause: { duration: 60s }
        - setWeight: 100
  selector:
    matchLabels:
      app: go-simple-webserver
  template:
    metadata:
      labels:
        app: go-simple-webserver
    spec:
      containers:
        - name: webserver
          image: ghcr.io/laurentiu-racovcen/ci_cd_lab@sha256:sha256:6c2b2354e7b42a5277e7dc6f2300a405afdd2df876a309b0c42d7454ccdca58c
          ports:
            - containerPort: 8080
          imagePullPolicy: Always
